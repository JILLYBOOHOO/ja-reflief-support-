<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>JaRelief</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Optimized Google Fonts (Reduced weights for performance) -->
  <link rel="preload" href="/assets/hmpg.webp" as="image" fetchpriority="high">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Manrope:wght@700;800&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#009b3a">
  <!-- Late Loading SDKs (Moved to specific feature modules) -->

  <!-- Inline theme script to prevent light mode flash -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
      }
    })();
  </script>
  <meta name="description" content="JA RELIEF - Official Jamaican Disaster Response and Aid Platform. Request assistance, donate items, and find emergency services near you.">
  <style>
    /* CRITICAL INITIAL SPLASH STYLES */
    .initial-loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8faf8;background-image:linear-gradient(135deg,#f8faf8,#e8eee8);font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#1a1c1a;z-index:99999;transition:opacity .5s ease}.spinner{width:60px;height:60px;border:6px solid #009b3a;border-bottom-color:transparent;border-radius:50%;display:inline-block;box-sizing:border-box;animation:rotation 1s cubic-bezier(.68,-.55,.265,1.55) infinite}@keyframes rotation{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.loading-text{margin-top:24px;font-weight:800;font-size:1.5rem;letter-spacing:-.03em;text-transform:uppercase;background:linear-gradient(90deg,#009b3a,#000);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.loading-subtext{margin-top:10px;color:#727972;font-size:.95rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em}.header{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem;color:#fff;background:linear-gradient(135deg,#009b3a,#000 30%,#000 70%,#fed100);width:100%;box-shadow:0 6px 0 #000;z-index:100;border-bottom:2px solid rgba(255,255,255,.1)}.header h1{margin:1rem 0;font-size:2.8rem;text-align:center;color:#fff;text-shadow:3px 3px 0 #000;font-family:Georgia,serif;font-weight:900;letter-spacing:-.05em}.critical-banner{background:#ba1a1a;color:#fff;padding:.5rem 1.5rem;text-align:center;font-weight:800;border-bottom:4px solid #000;z-index:1000}
  </style>
</head>

<body>
  <app-root>
    <div class="initial-loader">
      <span class="spinner"></span>
      <p class="loading-text">JA RELIEF is powering up</p>
      <p class="loading-subtext">Connecting you to emergency resources...</p>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
