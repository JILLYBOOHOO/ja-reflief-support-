<app-header></app-header>

<main id="main" [class.font-size-large]="currentFontSize === 'large'" [class.font-size-huge]="currentFontSize === 'huge'">
  <div class="page-content-wrapper">
    <div class="breadcrumb-container">
      <app-breadcrumb></app-breadcrumb>
    </div>
    <router-outlet></router-outlet>
  </div>
</main>

<app-footer></app-footer>
<app-ai-chatbot></app-ai-chatbot>

<!-- Cookie Consent Banner -->
<div class="cookie-banner" *ngIf="showCookieBanner">
  <div class="cookie-content">
    <p>We use cookies to improve your experience and ensure our platform runs securely. By continuing to use JA Relief, you agree to our use of cookies and our <a routerLink="/privacy" (click)="showCookieBanner=false">Privacy Statement</a>.</p>
    <button class="cookie-btn" (click)="acceptCookies()">Accept & Continue</button>
  </div>
</div>

<app-alert></app-alert>
